<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BMI / BMR / TDEE 計算器</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
  <div class="mx-auto max-w-3xl p-6">
    <h1 class="text-3xl font-semibold mb-4">BMI / BMR / TDEE 計算器</h1>
    <div class="space-y-4 bg-white p-6 rounded-2xl shadow-sm">
      <div class="grid gap-4 sm:grid-cols-2">
        <label class="space-y-1">
          <span class="font-medium">身高 (cm)</span>
          <input id="height" type="number" min="0" step="0.1" class="w-full rounded-lg border-gray-300 p-3" placeholder="例如 170" />
        </label>
        <label class="space-y-1">
          <span class="font-medium">體重 (kg)</span>
          <input id="weight" type="number" min="0" step="0.1" class="w-full rounded-lg border-gray-300 p-3" placeholder="例如 65" />
        </label>
      </div>
      <div class="grid gap-4 sm:grid-cols-2">
        <label class="space-y-1">
          <span class="font-medium">年齡</span>
          <input id="age" type="number" min="0" class="w-full rounded-lg border-gray-300 p-3" placeholder="例如 30" />
        </label>
        <label class="space-y-1">
          <span class="font-medium">性別</span>
          <select id="sex" class="w-full rounded-lg border-gray-300 p-3">
            <option value="">請選擇</option>
            <option value="male">男性</option>
            <option value="female">女性</option>
          </select>
        </label>
      </div>
      <label class="space-y-1">
        <span class="font-medium">活動量</span>
        <select id="activityLevel" class="w-full rounded-lg border-gray-300 p-3">
          <option value="">請選擇</option>
          <option value="sedentary">久坐少動</option>
          <option value="light">輕度活動</option>
          <option value="moderate">中度活動</option>
          <option value="active">高度活動</option>
          <option value="veryActive">非常活躍</option>
        </select>
      </label>
      <div class="flex flex-wrap gap-3">
        <button id="bmiButton" type="button" class="rounded-xl bg-slate-800 px-6 py-3 text-white disabled:cursor-not-allowed disabled:bg-slate-300">計算 BMI</button>
        <button id="bmrButton" type="button" class="rounded-xl bg-emerald-600 px-6 py-3 text-white disabled:cursor-not-allowed disabled:bg-slate-300">計算 BMR</button>
        <button id="tdeeButton" type="button" class="rounded-xl bg-cyan-600 px-6 py-3 text-white disabled:cursor-not-allowed disabled:bg-slate-300">計算 TDEE</button>
      </div>
      <div id="result" class="rounded-2xl border border-slate-200 bg-slate-50 p-5 text-slate-800"></div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
